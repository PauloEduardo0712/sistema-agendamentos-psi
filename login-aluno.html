<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Aluno — AgendaPsi</title>
  <link rel="stylesheet" href="style/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="icon">🎓</div>
      <h2>Login do Aluno</h2>
      <p>Acesse com sua matrícula e senha.</p>
    </div>

    <div id="alert-box"></div>

    <form id="form-login" novalidate>
      <div class="form-group">
        <label class="form-label" for="matricula">Matrícula</label>
        <input type="text" class="form-control" id="matricula" placeholder="Ex: 2024001" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input type="password" class="form-control" id="senha" placeholder="Sua senha" required />
        <p class="form-hint">Senha inicial padrão: seu CPF (somente números)</p>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>
    </form>

    <div class="auth-divider">ou</div>

    <a href="cadastro.html" class="btn btn-outline btn-block">✏️ Não tenho cadastro</a>
    <a href="index.html" class="btn btn-ghost btn-block" style="margin-top:8px;">← Voltar</a>
  </div>
</div>

<script src="js/dados.js"></script>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
<script src="js/login.js"></script>
</body>
</html>
